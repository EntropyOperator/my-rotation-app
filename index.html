<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像暗記ローテーション</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333;
            --container-bg: #f9f9f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --text-color: #eee;
                --container-bg: #2d2d2d;
            }
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
        }

        #display-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: var(--shadow);
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        #display-image.loaded {
            opacity: 1;
        }

        .error-message {
            color: #ff4d4d;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img id="display-image" alt="Memorization Image">
        <div id="error-message" class="error-message" style="display: none;">
            画像が見つかりません。<br>
            images/ フォルダに画像を追加してください。
        </div>
    </div>

    <script>
        /**
         * 設定
         */
        const CONFIG = {
            baseDate: new Date('2024-01-01'), // 基準日
            imageFolder: 'images/',
            // 画像名の配列（自動取得できないため、手動で更新が必要です）
            // 順番 = 表示順
            images: [
                '001.png',
                // 必要に応じて追加してください
            ]
        };

        function updateImage() {
            const imgElement = document.getElementById('display-image');
            const errorElement = document.getElementById('error-message');
            
            if (CONFIG.images.length === 0) {
                errorElement.style.display = 'block';
                return;
            }

            const now = new Date();
            // 日数差を計算（タイムゾーンを考慮するため、UTCベースで計算）
            const diffTime = Math.abs(now.setHours(0,0,0,0) - CONFIG.baseDate.setHours(0,0,0,0));
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            const index = diffDays % CONFIG.images.length;
            const imageName = CONFIG.images[index];
            
            imgElement.src = CONFIG.imageFolder + imageName;
            
            imgElement.onload = () => {
                imgElement.classList.add('loaded');
            };

            imgElement.onerror = () => {
                errorElement.style.display = 'block';
                imgElement.style.display = 'none';
                console.error('Failed to load image:', imageName);
            };
        }

        // 実行
        updateImage();
        
        // 日付が変わったら更新（常駐させる場合）
        setInterval(() => {
            const now = new Date();
            if (now.getHours() === 0 && now.getMinutes() === 0) {
                updateImage();
            }
        }, 60000);
    </script>
</body>
</html>
